<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bitez</title>

    <!-- favicon start here -->
    <link rel="icon" href="assets/media/png/logo/bitez.png">
    <!-- favicon end here -->

    <!-- external css start here -->
    <link rel="stylesheet" href="assets/css/main.css">
    <!-- external css end here -->

    <!-- external js start here -->
    <script type="module" src="assets/js/main.js"></script>
    <!-- external js end here -->

</head>

<body>

    <!-- desktop navigation start here -->
    <nav class="bitez-desktop-navigation">
        <div class="bitez-container">
            <div class="bitez-desktop-navigation__wrapper">
                <div class="bitez-logo">
                    <a href="" class="bitez-logo__link">
                        <img src="assets/media/png/logo/bitez_main.png" alt="bitez">
                    </a>
                </div>
                <ul class="bitez-desktop-navigation__list">
                    <li class="bitez-desktop-navigation__item">
                        <a href="" class="bitez-desktop-navigation__link">
                            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                                <title xmlns="">burger</title>
                                <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="2">
                                    <path
                                        d="M5 12a2 2 0 0 1-2-2a9 7 0 0 1 18 0a2 2 0 0 1-2 2l-3.5 4.1c-.8 1-2.4 1.1-3.4.3L7 12" />
                                    <path
                                        d="M11.7 16H4a2 2 0 0 1 0-4h16a2 2 0 0 1 0 4h-4.3M5 16a2 2 0 0 0-2 2c0 1.7 1.3 3 3 3h12c1.7 0 3-1.3 3-3a2 2 0 0 0-2-2" />
                                </g>
                            </svg>
                            smash burgers
                        </a>
                    </li>
                    <li class="bitez-desktop-navigation__item">
                        <a href="" class="bitez-desktop-navigation__link">
                            <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                                <title xmlns="">burger-line</title>
                                <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                    stroke-width="2">
                                    <path
                                        d="m15 15l3.379-3.379a2.12 2.12 0 0 1 1.5-.621H20a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v0a2 2 0 0 1 2-2h4.515a6 6 0 0 1 4.242 1.757zM3 15h18v2a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3z" />
                                    <path
                                        d="M12 4c-4.623 0-8.432 1.756-8.942 6c-.066.55.39 1 .942 1h16c.552 0 1.008-.45.942-1c-.51-4.244-4.319-6-8.942-6M7.001 8H7m5.002 0" />
                                </g>
                            </svg>
                            classic burgers
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- desktop navigation end here -->

    <!-- header start here -->
    <header class="bitez-slider">
        <ul class="bitez-slider__list">
            <li class="bitez-slider__item">
                <a href="" class="bitez-slider__link">
                    <img src="assets/media/png/burgers/burgers_2.png" alt="">
                </a>
            </li>
        </ul>
    </header>
    <!-- header end here -->

    <!-- burger start here -->
    <section class="bitez-burger">
        <h1 class="bitez-burger__heading">Hot Delicious Burger</h1>
        <div class="bitez-container">
            <ul class="bitez-filter-tab">
                 <li class="bitez-filter-tab__item">
                    all
                </li>
                <li class="bitez-filter-tab__item">
                    smash burger
                </li>
                <li class="bitez-filter-tab__item">
                    classic burger
                </li>
            </ul>
            <ul class="bitez-burger__list"></ul>
        </div>
    </section>
    <!-- burger end here -->

</body>

</html>
