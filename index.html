<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>B!tez</title>

    <!-- favicon start here -->
    <link rel="icon" href="assets/media/png/logo/bitez.png">
    <!-- favicon end here -->

    <!-- external css start here -->
    <link rel="stylesheet" href="assets/css/main.css">
    <!-- external css end here -->

    <!-- external js start here -->
    <script type="module" src="assets/js/app.js"></script>
    <!-- external js end here -->

</head>

<body>

    <header>
        <!-- navigation start here -->
        <nav class="navigation">
            <div class="container">
                <div class="navigation__wrapper">
                    <div class="logo">
                        <a href="" class="logo__link">
                            <img src="assets/media/png/logo/bitez_main.png" alt="bitez">
                        </a>
                    </div>
                    <ul class="navigation__list"></ul>
                </div>
            </div>
        </nav>
        <!-- navigation end here -->
    </header>

    <main>
        <section class="hero">
            <ul class="hero-slider__list">
                <li class="hero-slider__item">
                    <!-- <img src="assets/media/png/burgers/burgers_1.png" alt=""> -->
                    <!-- <video autoplay muted loop class="video-motion">
                        <source src="assets/media/mp4/burger.mp4" type="video/mp4">
                    </video> -->
                </li>
            </ul>
        </section>
    </main>

    <!-- burger start here -->
    <section id="burgers" class="product">
        <h1 class="product__heading">hot delicious burgers</h1>
        <div class="container">
            <menu class="filter-tab burger-filter-tab"></menu>
            <menu class="product-card burger-card"></menu>
        </div>
    </section>
    <!-- burger end here -->

    <!-- soft drink start here -->
    <section id="soft-drinks" class="product">
        <h1 class="product__heading">Soft Drinks</h1>
        <div class="container">
            <menu class="filter-tab soft-drink-filter-tab"></menu>
            <menu class="product-card soft-drink-card"></menu>
        </div>
    </section>
    <!-- soft drink end here -->

    <!-- faq start here -->
    <section id="faqs" class="faq">
        <h1 class="faq__heading">frequently asked questions</h1>
        <div class="container">
            <menu class="faq-accordion"></menu>
        </div>
    </section>
    <!-- faq end here -->

    <!-- career start here -->
    <section id="careers" class="career">
        <h1 class="career__heading">career</h1>
        <div class="container">
            <ul class="career-card"></ul>
        </div>
    </section>
    <!-- career end here -->

    <!-- footer start here -->
    <footer class="footer">
        <div class="container">
            <div class="footer__wrapper">
                <div class="footer-brand">
                    <a href="" class="footer-brand__link">
                        <div class="footer-brand__logo">
                            <img src="assets/media/png/logo/bitez_main.png" alt="bitez">
                        </div>
                    </a>
                    <p class="footer-brand__decription">
                        Everything start with a B!TEZ <br />
                        Everything is attracted to B!TEZ
                    </p>
                </div>
                <section class="footer-contact">
                    <h1 class="footer__heading">contact</h1>
                    <menu class="footer-contact__list"></menu>
                </section>
                <section class="footer-link">
                    <h1 class="footer__heading footer-link__heading">links</h1>
                    <nav class="footer-navigation">
                        <ul class="footer-navigation__list"></ul>
                    </nav>
                </section>
                <section class="footer-follow-us">
                    <h1 class="footer__heading">follow us</h1>
                    <ul class="footer-follow-us__list"></ul>
                </section>
            </div>
        </div>
    </footer>
    <!-- footer end here -->

    <!-- <div class="load-screen"></div> -->

</body>

</html>
